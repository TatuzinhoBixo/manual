# ConfigMap para configurações gerais do WordPress
# Substitua as variáveis <...> pelos valores do seu ambiente
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-config
  namespace: <NAMESPACE>
data:
  WORDPRESS_DB_HOST: "<DB_HOST>"
  WORDPRESS_DB_NAME: "<DB_NAME>"
  WORDPRESS_DB_USER: "<DB_USER>"
  WORDPRESS_TABLE_PREFIX: "wp_"
---
# Secret para dados sensíveis
# Gere o valor base64 com: echo -n 'sua_senha' | base64
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-secret
  namespace: <NAMESPACE>
type: Opaque
data:
  WORDPRESS_DB_PASSWORD: <DB_PASSWORD_BASE64>
